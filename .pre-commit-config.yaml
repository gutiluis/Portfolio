# pre-commit-config.yml configuration flag options: id, name, args, files, exclude hooks
# pre-commit ignores external hooks


repos:
  # 1. Code formatting with Black. checks and reformats python code
  # no installatin in venv. isolated environement repo: non local
  - repo: https://github.com/psf/black
    rev: 26.3.1   # use the latest stable tag
    hooks:
      - id: black
        language_version: python3
        types: [python]

  # 2. Linting with Flake8. coding style and warnings about bugs. officialy hosted in gitlab will need a gitlab account
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        language_version: python3
        additional_dependencies: [flake8-bugbear]
        types: [python]

  # 3. Detect trailing whitespace, tabs, empty files, validates yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml # for parseable syntax
      # let the server handle compression gzip, bzip2
      # prevent giant files from being commited # default=500kb
      - id: check-added-large-files # prevents giant files from being commited
